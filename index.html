<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BARISTA Quiz</title>
    <!-- This link is what applies your colors and layout -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="root">
        <div class="quiz-container" id="login-screen">
            <h1>BARISTA QUIZ</h1>
            <h3>COFFEE FUNDAMENTALS QUIZ 2026</h3>
            <p class="instruction">Please enter your name and the team invite code to start your Week 1 assessment.</p>

            <label for="name">YOUR FULL NAME</label>
            <input type="text" id="name" placeholder="Enter your name">

            <label for="code">INVITE CODE</label>
            <input type="text" id="code" placeholder="Enter invite code">

            <p id="loginError" class="error-message" style="display:none;"></p>

            <button id="startBtn">Verify &amp; Start Quiz</button>
        </div>

        <div class="quiz-container quiz-screen" id="quiz-screen" style="display:none;">
            <div id="progress" class="progress"></div>
            <div id="quiz"></div>
        </div>
    </div>

<!-- Load your data first -->
<script src="questions.js" defer></script>
<!-- Invite code config (gitignored - copy config.example.js to config.js and edit it) -->
<script src="config.js" defer></script>
<!-- Load your game logic last -->
<script src="script.js" defer></script>
</body>
</html>
